<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plouc</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&display=swap" rel="stylesheet">
</head>

<body>
  <main class="hero">
    <img src="plouc-logo.png" alt="Plouc logo" class="logo" />

    <section class="hero-grid">
      <div class="intro">
        <h1>hey there!</h1>

        <img
          src="friends-1.jpg"
          alt="Friends sitting together"
          class="photo photo-left"
        />
      </div>

      <div class="message">
        <img
          src="friends-2.jpg"
          alt="Friends smiling together"
          class="photo photo-right"
        />

        <h2>we’re here to make social media social again</h2>

        <a href="#how-it-works" class="button">Explore How</a>
      </div>
    </section>
  </main>

  <section id="how-it-works" class="section">
    <h2>How Plouc Works</h2>
    <p>
      Plouc helps people nearby discover each other through profile cards,
      social links, and real-time location-based discovery.
    </p>
  </section>

  <footer>
    <a href="privacy-policy.html">Privacy Policy</a>
    <a href="terms-and-conditions.html">Terms & Conditions</a>
    <a href="support.html">Support</a>
  </footer>
</body>
</html>
